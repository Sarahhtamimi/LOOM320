<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LOOM — Sign Up</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Inter:wght@400;500;600;700;800&display=swap"
    rel="stylesheet" />

  <style>
    :root {
      --bg: #F3E8E8;
      --card: rgba(255, 255, 255, .72);
      --charcoal: #434543;
      --forest: #6B7883;
      --terracotta: #B56449;
      --blush: #DEA4AD;
      --muted: rgba(67, 69, 67, .68);
      --border: rgba(67, 69, 67, .10);
      --shadow: 0 22px 60px rgba(67, 69, 67, .10);
      --shadow-soft: 0 12px 32px rgba(67, 69, 67, .08);
      --r-xl: 28px;
      --r-lg: 22px;
      --r-md: 16px;
      --r-sm: 12px;
      --max: 1180px;
      --ease: cubic-bezier(.2, .8, .2, 1);
      --error: #b54b4b;
      --success: #4d6a58;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      min-height: 100vh;
      font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      color: var(--charcoal);
      background:
        radial-gradient(900px 460px at 12% -5%, rgba(222, 164, 173, .33), transparent 60%),
        radial-gradient(900px 480px at 88% 0%, rgba(107, 120, 131, .18), transparent 60%),
        linear-gradient(180deg, #f6ecec 0%, var(--bg) 40%, #f4eaea 100%);
      overflow-x: hidden;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    button {
      font: inherit;
    }

    .container {
      width: min(var(--max), calc(100% - 40px));
      margin: 0 auto;
    }

    .header {
      position: sticky;
      top: 0;
      z-index: 60;
      backdrop-filter: blur(14px);
      background: rgba(243, 232, 232, .72);
      border-bottom: 1px solid var(--border);
    }

    .header-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      padding: 14px 0;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 180px;
    }

    .logo-mark {
      width: 38px;
      height: 38px;
      display: grid;
      place-items: center;
      border-radius: 14px;
      background: rgba(255, 255, 255, .66);
      border: 1px solid var(--border);
      box-shadow: var(--shadow-soft);
    }

    .wordmark {
      font-family: "Cormorant Garamond", serif;
      font-size: 26px;
      font-weight: 700;
      letter-spacing: .08em;
    }

    nav {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 0 12px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: rgba(255, 255, 255, .58);
      box-shadow: var(--shadow-soft);
    }

    nav a {
      padding: 11px 10px;
      font-size: 13px;
      font-weight: 700;
      color: rgba(67, 69, 67, .84);
      position: relative;
    }

    nav a.active::after {
      content: "";
      position: absolute;
      left: 10px;
      right: 10px;
      bottom: 7px;
      height: 2px;
      border-radius: 999px;
      background: linear-gradient(90deg, var(--terracotta), var(--blush));
    }

    .header-actions {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .pill {
      border-radius: 999px;
      border: 1px solid var(--border);
      padding: 11px 14px;
      font-size: 13px;
      font-weight: 800;
      background: rgba(255, 255, 255, .65);
      box-shadow: var(--shadow-soft);
    }

    .auth-page {
      padding: 42px 0 60px;
    }

    .auth-shell {
      position: relative;
      overflow: hidden;
      border: 1px solid var(--border);
      border-radius: 34px;
      box-shadow: var(--shadow);
      background:
        radial-gradient(760px 340px at 0% 0%, rgba(222, 164, 173, .30), transparent 60%),
        radial-gradient(720px 320px at 100% 10%, rgba(107, 120, 131, .18), transparent 58%),
        rgba(255, 255, 255, .58);
      padding: 34px;
      min-height: calc(100vh - 180px);
      display: grid;
      place-items: center;
      isolation: isolate;
    }

    .auth-wrapper {
      position: relative;
      z-index: 2;
      width: 100%;
      max-width: 540px;
      text-align: center;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: rgba(255, 255, 255, .62);
      font-size: 12px;
      font-weight: 800;
      box-shadow: var(--shadow-soft);
      margin-bottom: 18px;
    }

    .eyebrow i {
      width: 8px;
      height: 8px;
      border-radius: 999px;
      background: var(--terracotta);
      display: inline-block;
    }

    h1 {
      margin: 0 0 10px;
      font-family: "Cormorant Garamond", serif;
      font-size: clamp(42px, 5vw, 64px);
      line-height: .95;
      letter-spacing: .01em;
    }

    .subtitle {
      margin: 0 auto 24px;
      max-width: 42ch;
      font-size: 15px;
      line-height: 1.7;
      color: var(--muted);
    }

    .card {
      width: 100%;
      margin: 0 auto;
      padding: 26px;
      border-radius: 28px;
      background: rgba(255, 255, 255, .76);
      border: 1px solid var(--border);
      box-shadow: var(--shadow-soft);
      text-align: left;
      backdrop-filter: blur(10px);
    }

    .form-grid {
      display: grid;
      gap: 14px;
    }

    .field label {
      display: block;
      margin-bottom: 8px;
      font-size: 13px;
      font-weight: 800;
      color: var(--charcoal);
    }

    .field input {
      width: 100%;
      height: 50px;
      border-radius: 16px;
      border: 1px solid var(--border);
      background: rgba(255, 255, 255, .86);
      padding: 0 16px;
      font-size: 14px;
      color: var(--charcoal);
      outline: none;
      transition: border-color .2s ease, box-shadow .2s ease, transform .2s ease;
    }

    .field input::placeholder {
      color: rgba(67, 69, 67, .42);
    }

    .field input:focus {
      border-color: rgba(222, 164, 173, .95);
      box-shadow: 0 0 0 4px rgba(222, 164, 173, .16);
      transform: translateY(-1px);
    }

    .field input.invalid {
      border-color: var(--error);
      background: #fff8f8;
    }

    .error-text {
      display: block;
      min-height: 16px;
      margin-top: 6px;
      font-size: 12px;
      color: var(--error);
    }

    .message {
      display: none;
      margin: 4px 0 2px;
      padding: 12px 14px;
      border-radius: 16px;
      font-size: 13px;
      line-height: 1.5;
      border: 1px solid transparent;
    }

    .message.error {
      display: block;
      color: var(--error);
      background: #fff1f1;
      border-color: #efcaca;
    }

    .message.success {
      display: block;
      color: var(--success);
      background: #eef6f0;
      border-color: #cadecf;
    }

    .submit-btn {
      width: 100%;
      border: none;
      cursor: pointer;
      border-radius: 18px;
      padding: 14px 18px;
      font-weight: 800;
      font-size: 15px;
      color: var(--charcoal);
      background: linear-gradient(135deg, rgba(181, 100, 73, .24), rgba(222, 164, 173, .28));
      border: 1px solid rgba(181, 100, 73, .28);
      transition: transform .18s var(--ease), box-shadow .18s var(--ease), filter .18s var(--ease);
      box-shadow: var(--shadow-soft);
      margin-top: 4px;
    }

    .submit-btn:hover {
      transform: translateY(-1px);
      box-shadow: var(--shadow);
    }

    .submit-btn:disabled {
      opacity: .78;
      cursor: not-allowed;
      transform: none;
    }

    .bottom-text {
      text-align: center;
      margin-top: 16px;
      font-size: 14px;
      color: var(--forest);
    }

    .switch-link {
      color: var(--terracotta);
      font-weight: 700;
    }

    .error-text {
      display: block;
      margin-top: 6px;
      font-size: 13px;
      color: #b3261e;
      min-height: 18px;
    }

    .message {
      margin-top: 6px;
      font-size: 14px;
      font-weight: 600;
      min-height: 20px;
    }

    .message.success {
      color: #2e7d32;
    }

    .message.error {
      color: #b3261e;
    }

    input.invalid {
      border: 1px solid #b3261e !important;
      box-shadow: 0 0 0 3px rgba(179, 38, 30, 0.10);
    }

    @media (max-width: 980px) {
      nav {
        display: none;
      }
    }

    @media (max-width: 620px) {
      .container {
        width: min(var(--max), calc(100% - 24px));
      }

      .auth-shell {
        padding: 18px;
        border-radius: 26px;
      }

      .card {
        padding: 20px 16px;
        border-radius: 22px;
      }

      h1 {
        font-size: 42px;
      }
    }
  </style>
</head>

<body>

  <main class="auth-page">
    <div class="container">
      <section class="auth-shell">


        <div class="auth-wrapper">
          <div class="eyebrow"><i></i> Create your LOOM account</div>
          <h1>Join LOOM</h1>
          <p class="subtitle">
            Create an account to start your sustainable fashion journey with a calm, elegant experience.
          </p>

          <div class="card">
            <form id="signupForm" novalidate>
              <div class="form-grid">
                <div class="field">
                  <label for="fullName">Full Name</label>
                  <input type="text" id="fullName" name="fullName" placeholder="Your name" />
                  <small class="error-text" id="fullNameError"></small>
                </div>

                <div class="field">
                  <label for="email">Email</label>
                  <input type="email" id="email" name="email" placeholder="you@example.com" />
                  <small class="error-text" id="emailError"></small>
                </div>

                <div class="field">
                  <label for="password">Password</label>
                  <input type="password" id="password" name="password" placeholder="••••••••" />
                  <small class="error-text" id="passwordError"></small>
                </div>

                <div id="formMessage" class="message"></div>

                <button type="submit" class="submit-btn">Create Account</button>

                <p class="bottom-text">
                  Already have an account?
                  <a class="switch-link" href="login.html">Sign In</a>
                </p>
              </div>
            </form>
          </div>
        </div>
      </section>
    </div>
  </main>






  <script>
    const signupForm = document.getElementById("signupForm");
    const fullNameInput = document.getElementById("fullName");
    const emailInput = document.getElementById("email");
    const passwordInput = document.getElementById("password");

    const fullNameError = document.getElementById("fullNameError");
    const emailError = document.getElementById("emailError");
    const passwordError = document.getElementById("passwordError");
    const formMessage = document.getElementById("formMessage");

    const submitButton = signupForm.querySelector(".submit-btn");

    function clearErrors() {
      fullNameError.textContent = "";
      emailError.textContent = "";
      passwordError.textContent = "";
      formMessage.textContent = "";
      formMessage.className = "message";

      fullNameInput.classList.remove("invalid");
      emailInput.classList.remove("invalid");
      passwordInput.classList.remove("invalid");
    }

    function showFieldError(input, errorElement, message) {
      errorElement.textContent = message;
      input.classList.add("invalid");
    }

    function showFormMessage(message, type) {
      formMessage.textContent = message;
      formMessage.className = "message " + type;
    }

    function isValidEmail(email) {
      return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
    }

    function isValidPassword(password) {
      return /^(?=.*[A-Za-z])(?=.*\d).{8,}$/.test(password);
    }

    function validateSignupForm() {
      clearErrors();

      const fullName = fullNameInput.value.trim();
      const email = emailInput.value.trim().toLowerCase();
      const password = passwordInput.value.trim();

      let isValid = true;

      if (fullName === "") {
        showFieldError(fullNameInput, fullNameError, "Please enter your full name.");
        isValid = false;
      } else if (fullName.length < 3) {
        showFieldError(fullNameInput, fullNameError, "Name must be at least 3 characters.");
        isValid = false;
      }

      if (email === "") {
        showFieldError(emailInput, emailError, "Please enter your email.");
        isValid = false;
      } else if (!isValidEmail(email)) {
        showFieldError(emailInput, emailError, "Please enter a valid email address.");
        isValid = false;
      }

      if (password === "") {
        showFieldError(passwordInput, passwordError, "Please enter your password.");
        isValid = false;
      } else if (!isValidPassword(password)) {
        showFieldError(
          passwordInput,
          passwordError,
          "Password must be at least 8 characters and include at least one letter and one number."
        );
        isValid = false;
      }

      if (!isValid) return null;

      return {
        fullName,
        email,
        password
      };
    }

    function getStoredUsers() {
      return JSON.parse(localStorage.getItem("loomUsers")) || [];
    }

    function saveStoredUsers(users) {
      localStorage.setItem("loomUsers", JSON.stringify(users));
    }

    signupForm.addEventListener("submit", function (e) {
      e.preventDefault();

      const userData = validateSignupForm();
      if (!userData) return;

      submitButton.disabled = true;
      submitButton.textContent = "Creating...";

      try {
        const users = getStoredUsers();

        const existingUser = users.find(
          user => user.email.toLowerCase() === userData.email.toLowerCase()
        );

        if (existingUser) {
          showFieldError(emailInput, emailError, "This email is already registered.");
          showFormMessage("Registration failed. This email already exists.", "error");
          submitButton.disabled = false;
          submitButton.textContent = "Create Account";
          return;
        }

        users.push(userData);
        saveStoredUsers(users);

        localStorage.setItem("loomLoggedInUser", userData.fullName);
        localStorage.setItem("loomUserEmail", userData.email);

        showFormMessage("Account created successfully. Redirecting...", "success");
        signupForm.reset();

        setTimeout(function () {
          window.location.href = "index.html";
        }, 1000);
      } catch (error) {
        showFormMessage("Something went wrong. Please try again.", "error");
        submitButton.disabled = false;
        submitButton.textContent = "Create Account";
        return;
      }

      submitButton.disabled = false;
      submitButton.textContent = "Create Account";
    });

    fullNameInput.addEventListener("input", function () {
      fullNameError.textContent = "";
      fullNameInput.classList.remove("invalid");
      formMessage.textContent = "";
      formMessage.className = "message";
    });

    emailInput.addEventListener("input", function () {
      emailError.textContent = "";
      emailInput.classList.remove("invalid");
      formMessage.textContent = "";
      formMessage.className = "message";
    });

    passwordInput.addEventListener("input", function () {
      passwordError.textContent = "";
      passwordInput.classList.remove("invalid");
      formMessage.textContent = "";
      formMessage.className = "message";
    });
  </script>

</body>

</html>
